name: Update aggregated RSS

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-rss
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine build mode
        id: build-mode
        run: |
          mode=full
          if [ "${{ github.event_name }}" = "push" ]; then
            changed_files="$(git diff --name-only HEAD^ HEAD || true)"
            if [ -n "$changed_files" ] && ! printf '%s\n' "$changed_files" | grep -Ev '^(src/reader\.js|test/reader\.test\.js|README\.md)$' >/dev/null; then
              mode=reader
            fi
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Build mode: $mode"

      - name: Restore crawl state
        uses: actions/cache/restore@v4
        with:
          path: |
            data
            public
          key: rss-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            rss-state-

      - name: Render reader from cached output
        id: render-reader
        if: steps.build-mode.outputs.mode == 'reader'
        continue-on-error: true
        run: npm run render:reader

      - name: Build aggregated feed
        id: build-full
        if: steps.build-mode.outputs.mode == 'full' || steps.render-reader.outcome == 'failure'
        run: npm run update

      - name: Save crawl state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data
            public
          key: rss-state-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit quality summary
        if: steps.build-full.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quality-summary.json
          git diff --cached --quiet || git commit -m "chore: update quality summary"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
