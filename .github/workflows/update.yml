name: Update aggregated RSS

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: update-rss
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore crawl state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: rss-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            rss-state-

      - name: Build aggregated feed
        run: npm run update

      - name: Save crawl state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: rss-state-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
